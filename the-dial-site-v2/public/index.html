<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dial — Manager Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;--border:#272727;--accent:#c8a96e;--accent2:#e2c97e;--text:#f0ece4;--muted:#6e6a65;--green:#4fb87a;--amber:#f0a832;--red:#e0544e;--blue:#5b9bd5;--purple:#9b72cf;--sport:#e05a8a;--boxing:#f07832;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:200;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;letter-spacing:.05em;color:var(--accent);}
.logo span{color:var(--muted);font-size:.85rem;font-family:'DM Sans',sans-serif;font-weight:300;margin-left:8px;vertical-align:middle;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.btn-h{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:border-color .15s;}
.btn-h:hover{border-color:var(--accent);color:var(--accent);}
.clock{font-family:'DM Mono',monospace;font-size:.88rem;color:var(--accent);background:var(--surface);border:1px solid var(--border);padding:5px 11px;border-radius:6px;}
.shell{display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 55px);}
aside{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;max-height:calc(100vh - 55px);position:sticky;top:55px;}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--border);}
.week-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:27px;height:27px;border-radius:5px;cursor:pointer;font-size:.95rem;}
.week-nav button:hover{border-color:var(--accent);color:var(--accent);}
.wk-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.day-tab{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;transition:background .12s;}
.day-tab:hover{background:var(--surface2);}
.day-tab.active{background:rgba(200,169,110,.09);border-left:3px solid var(--accent);}
.date-num{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--muted);min-width:28px;line-height:1.1;}
.day-tab.active .date-num{color:var(--accent);}
.day-info{flex:1;min-width:0;}
.day-name{font-size:.69rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
.ev-pill{font-size:.68rem;padding:1px 5px;border-radius:3px;display:inline-block;margin:2px 2px 0 0;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ev-pill.arena{background:rgba(200,169,110,.12);color:var(--accent);border:1px solid rgba(200,169,110,.28);}
.ev-pill.indigo{background:rgba(91,155,213,.12);color:var(--blue);border:1px solid rgba(91,155,213,.28);}
.ev-pill.sport{background:rgba(224,90,138,.12);color:var(--sport);border:1px solid rgba(224,90,138,.28);}
.ev-pill.boxing{background:rgba(240,120,50,.12);color:var(--boxing);border:1px solid rgba(240,120,50,.28);}
.ev-pill.pl{background:rgba(56,0,180,.18);color:#a78bfa;border:1px solid rgba(130,80,255,.3);}
.ev-pill.custom{background:rgba(79,184,122,.12);color:var(--green);border:1px solid rgba(79,184,122,.28);}
.busy-bar{width:100%;height:3px;border-radius:2px;background:var(--surface2);overflow:hidden;margin-top:4px;}
.busy-fill{height:100%;border-radius:2px;}
main{padding:20px;overflow-y:auto;}
.view-tabs{display:flex;gap:6px;margin-bottom:18px;}
.view-tab{padding:5px 13px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:.78rem;color:var(--muted);transition:all .14s;}
.view-tab:hover,.view-tab.active{border-color:var(--accent);color:var(--accent);}
.view-tab.active{background:rgba(200,169,110,.1);}
.event-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;}
.etb h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.04em;line-height:1;}
.vbadge{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;padding:3px 8px;border-radius:4px;}
.vbadge.arena{background:rgba(200,169,110,.12);color:var(--accent);border:1px solid rgba(200,169,110,.28);}
.vbadge.indigo{background:rgba(91,155,213,.12);color:var(--blue);border:1px solid rgba(91,155,213,.28);}
.vbadge.custom{background:rgba(79,184,122,.12);color:var(--green);border:1px solid rgba(79,184,122,.28);}
.time-info{font-size:.78rem;color:var(--muted);margin-top:4px;}
.busy-meter{text-align:right;flex-shrink:0;}
.bm-label{font-size:.63rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px;}
.bm-num{font-family:'Bebas Neue',sans-serif;font-size:2.7rem;line-height:1;}
.bm-sub{font-size:.7rem;color:var(--muted);}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:13px;}
.card-lbl{font-size:.63rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;}
.card-val{font-size:.96rem;font-weight:500;line-height:1.3;}
.tag{display:inline-block;border-radius:4px;font-size:.73rem;padding:2px 7px;margin:2px 2px 0 0;}
.tag-a{background:rgba(240,168,50,.1);color:var(--amber);border:1px solid rgba(240,168,50,.28);}
.tag-r{background:rgba(224,84,78,.1);color:var(--red);border:1px solid rgba(224,84,78,.28);}
.tag-g{background:rgba(79,184,122,.1);color:var(--green);border:1px solid rgba(79,184,122,.28);}
.tag-b{background:rgba(91,155,213,.1);color:var(--blue);border:1px solid rgba(91,155,213,.28);}
.section{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:17px;margin-bottom:13px;}
.section h2{font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:11px;display:flex;justify-content:space-between;align-items:center;}
.section h2 a{font-size:.68rem;color:var(--accent);cursor:pointer;letter-spacing:0;text-transform:none;font-weight:400;}
.crowd-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.ccard{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:12px;}
.ccard h3{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;}
.ccard p{font-size:.84rem;line-height:1.55;}
.drink-bars{display:flex;flex-direction:column;gap:8px;}
.drink-row{display:flex;align-items:center;gap:8px;}
.drink-lbl{width:126px;font-size:.79rem;flex-shrink:0;}
.drink-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.drink-fill{height:100%;border-radius:4px;}
.drink-pct{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);width:28px;text-align:right;}
.timing-row{display:flex;}
.tblock{flex:1;text-align:center;padding:8px 3px;position:relative;}
.tblock:not(:last-child)::after{content:'';position:absolute;right:0;top:15%;height:70%;width:1px;background:var(--border);}
.tb-time{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);}
.tb-lbl{font-size:.66rem;color:var(--muted);margin-top:2px;}
.tb-desc{font-size:.74rem;margin-top:3px;}

/* SPORT BANNERS */
.sport-banner{border-radius:9px;padding:15px;margin-bottom:13px;}
.sport-banner.football{background:rgba(224,90,138,.06);border:1px solid rgba(224,90,138,.22);}
.sport-banner.pl-banner{background:rgba(100,60,220,.06);border:1px solid rgba(130,80,255,.22);}
.sport-banner.boxing-banner{background:rgba(240,120,50,.06);border:1px solid rgba(240,120,50,.22);}
.sport-banner h2{font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;margin-bottom:11px;}
.sport-banner.football h2{color:var(--sport);}
.sport-banner.pl-banner h2{color:#a78bfa;}
.sport-banner.boxing-banner h2{color:var(--boxing);}
.sport-ev{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.sport-ev:last-child{border-bottom:none;padding-bottom:0;}
.sport-badge{border-radius:5px;padding:4px 8px;font-size:.7rem;font-weight:600;white-space:nowrap;}
.sport-badge.football{background:rgba(224,90,138,.14);color:var(--sport);}
.sport-badge.pl{background:rgba(130,80,255,.18);color:#a78bfa;}
.sport-badge.boxing{background:rgba(240,120,50,.18);color:var(--boxing);}
.sdtl h3{font-size:.88rem;font-weight:600;margin-bottom:2px;}
.sdtl .sm{font-size:.74rem;color:var(--muted);margin-bottom:3px;}
.sdtl p{font-size:.8rem;line-height:1.5;}
.impact-line{margin-top:4px;font-size:.8rem;font-weight:600;}
.impact-line.critical{color:var(--red);}
.impact-line.very-high{color:var(--boxing);}
.impact-line.high{color:var(--amber);}
.impact-line.moderate{color:var(--green);}

/* CUSTOM EVENTS */
.custom-banner{background:rgba(79,184,122,.05);border:1px solid rgba(79,184,122,.2);border-radius:9px;padding:15px;margin-bottom:13px;}
.custom-banner h2{font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--green);margin-bottom:11px;}
.cb-ev{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(79,184,122,.1);}
.cb-ev:last-child{border-bottom:none;padding-bottom:0;}
.cb-badge{border-radius:4px;padding:3px 8px;font-size:.69rem;font-weight:600;white-space:nowrap;}
.cb-badge.vip{background:rgba(200,169,110,.12);color:var(--accent);}
.cb-badge.private{background:rgba(155,114,207,.12);color:var(--purple);}
.cb-badge.corporate{background:rgba(91,155,213,.12);color:var(--blue);}
.cb-badge.birthday{background:rgba(224,90,138,.12);color:var(--sport);}
.cb-badge.other{background:rgba(110,106,101,.12);color:var(--muted);}
.cb-dtl{flex:1;}
.cb-name{font-size:.86rem;font-weight:500;}
.cb-meta{font-size:.73rem;color:var(--muted);margin-top:1px;}

/* FORMS */
input,textarea,select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;padding:8px 10px;width:100%;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);}
select option{background:var(--surface2);}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;}
.btn-p{background:var(--accent);color:#0d0d0d;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;}
.btn-p:hover{background:var(--accent2);}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.82rem;}
.btn-s:hover{border-color:var(--accent);}
.factions{display:flex;align-items:center;gap:9px;margin-top:11px;}
.saved{font-size:.76rem;color:var(--green);display:none;}

/* REVENUE */
.rh-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);font-size:.8rem;}
.rh-row:last-child{border-bottom:none;}
.rh-date{color:var(--muted);min-width:90px;font-family:'DM Mono',monospace;font-size:.73rem;}
.rh-ev{flex:1;}
.rh-total{font-family:'DM Mono',monospace;color:var(--accent);font-size:.85rem;}
.rh-break{font-size:.7rem;color:var(--muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;width:480px;max-width:100%;max-height:88vh;overflow-y:auto;}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:.04em;margin-bottom:14px;color:var(--accent);}
.mclose{float:right;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;line-height:1;margin-top:-2px;}
.mclose:hover{color:var(--text);}


/* WEATHER — handled by .card class */

/* UPCOMING */
.upcoming-section{margin-top:18px;}
.upc-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:6px;}
.upc-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px;min-width:150px;flex-shrink:0;cursor:pointer;transition:border-color .13s;}
.upc-card:hover{border-color:var(--accent);}
.upc-date{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.upc-name{font-weight:600;font-size:.83rem;margin:3px 0;line-height:1.2;}
.upc-busy{font-size:.71rem;}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px;color:var(--muted);gap:9px;}
.empty-state .esi{font-size:2rem;}

@media(max-width:760px){.shell{grid-template-columns:1fr;}aside{position:relative;top:0;max-height:none;}.grid3{grid-template-columns:1fr 1fr;}.crowd-grid,.fgrid2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="logo">The Dial <span>Manager Dashboard</span></div>
  <div class="hdr-right">
    <span id="refresh-badge" style="font-size:.67rem;color:var(--muted);border:1px solid var(--border);padding:4px 9px;border-radius:5px;display:flex;align-items:center;gap:5px;">
      <span id="refresh-dot" style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0;"></span>
      <span id="refresh-label">Auto-refresh on</span>
    </span>
    <button class="btn-h" onclick="openAddEvent()">+ Add Event</button>
    <button class="btn-h" onclick="openRevModal()">£ Log Revenue</button>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="shell">
  <aside id="sidebar">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <span class="wk-label" id="wk-label"></span>
      <button onclick="changeWeek(1)">›</button>
    </div>
    <div id="day-tabs"></div>
  </aside>
  <main id="main"></main>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="m-add">
  <div class="modal">
    <button class="mclose" onclick="closeModal('m-add')">✕</button>
    <h3>Add Custom Event</h3>
    <div class="fgrid2">
      <div class="fg"><label class="fl">Event Name</label><input id="ae-name" placeholder="e.g. Private Hire – Smith Co."></div>
      <div class="fg"><label class="fl">Date</label><input id="ae-date" type="date"></div>
      <div class="fg"><label class="fl">Start Time</label><input id="ae-time" type="time" value="19:00"></div>
      <div class="fg"><label class="fl">Type</label><select id="ae-type"><option value="vip">VIP / Table Booking</option><option value="private">Private Hire</option><option value="corporate">Corporate</option><option value="birthday">Birthday / Celebration</option><option value="other">Other</option></select></div>
      <div class="fg"><label class="fl">Expected Guests</label><input id="ae-covers" type="number" placeholder="e.g. 80"></div>
      <div class="fg"><label class="fl">Est. Spend (£)</label><input id="ae-spend" type="number" placeholder="e.g. 3500"></div>
    </div>
    <div class="fg" style="margin-bottom:10px"><label class="fl">Team Notes</label><textarea id="ae-notes" rows="3" placeholder="Dietary needs, contact, special requests..."></textarea></div>
    <div class="factions"><button class="btn-p" onclick="saveCustomEvent()">Save Event</button><button class="btn-s" onclick="closeModal('m-add')">Cancel</button><span class="saved" id="ae-saved">✓ Saved</span></div>
  </div>
</div>

<!-- REVENUE MODAL -->
<div class="modal-overlay" id="m-rev">
  <div class="modal">
    <button class="mclose" onclick="closeModal('m-rev')">✕</button>
    <h3>Log Revenue</h3>
    <div class="fg" style="margin-bottom:9px"><label class="fl">Date</label><input id="rv-date" type="date"></div>
    <div class="fgrid2">
      <div class="fg"><label class="fl">Total Revenue (£)</label><input id="rv-total" type="number" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label class="fl">Food Revenue (£)</label><input id="rv-food" type="number" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label class="fl">Drinks Revenue (£)</label><input id="rv-drinks" type="number" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label class="fl">Covers / Guests</label><input id="rv-covers" type="number" placeholder="0"></div>
    </div>
    <div class="fgrid2" style="margin-bottom:9px">
      <div class="fg"><label class="fl">Weather / Conditions</label>
        <select id="rv-weather">
          <option value="">— Select —</option>
          <option>☀️ Clear / Sunny</option><option>🌤️ Partly Cloudy</option><option>☁️ Overcast</option>
          <option>🌧️ Rain</option><option>⛈️ Heavy Rain / Storm</option><option>❄️ Cold & Dry</option>
          <option>🌫️ Foggy</option><option>🌬️ Windy</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Weather Impact (1–10)</label><input id="rv-weather-score" type="number" min="1" max="10" placeholder="1=hurt, 10=helped"></div>
    </div>
    <div class="fg" style="margin-bottom:9px"><label class="fl">Notes</label><textarea id="rv-notes" rows="2" placeholder="Night summary..."></textarea></div>
    <div class="factions"><button class="btn-p" onclick="saveRevModal()">Save</button><button class="btn-s" onclick="closeModal('m-rev')">Cancel</button><span class="saved" id="rv-saved">✓ Saved</span></div>
  </div>
</div>

function wmoDesc(code) {
  if(code===0) return['☀️','Clear skies'];
  if(code===1) return['🌤️','Mainly clear'];
  if(code===2) return['⛅','Partly cloudy'];
  if(code===3) return['☁️','Overcast'];
  if(code<=45) return['🌫️','Foggy'];
  if(code<=48) return['🌫️','Freezing fog'];
  if(code<=55) return['🌦️','Drizzle'];
  if(code<=57) return['🌧️','Freezing drizzle'];
  if(code<=65) return['🌧️','Rain'];
  if(code<=67) return['🌨️','Freezing rain'];
  if(code<=75) return['❄️','Snowfall'];
  if(code<=77) return['🌨️','Snow grains'];
  if(code<=82) return['🌦️','Rain showers'];
  if(code<=86) return['🌨️','Snow showers'];
  if(code<=99) return['⛈️','Thunderstorm'];
  return['🌡️','Unknown'];
}

  if(code<=79) return -5;
  if(code<=82) return -8;
  if(code<=99) return -22;
  return 0;
}

  if(code<=45) return['🌫️','Fog'];
  if(code<=55) return['🌦️','Drizzle'];
  if(code<=65) return['🌧️','Rain'];
  if(code<=75) return['❄️','Snow'];
  if(code<=82) return['🌧️','Rain showers'];
  if(code<=99) return['⛈️','Thunderstorm'];
  return['🌡️','Unknown'];
}

function getWxImpact(ds){
  if(!WX_API) return 0;
  const i = WX_API.time.indexOf(ds);
  return i !== -1 ? wxImpactFromCode(WX_API.weathercode[i]) : 0;
}

async function fetchLiveWeather(){
  try{
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&timezone=Europe/London&forecast_days=14');
    if(!r.ok) throw new Error(r.status);
    const d = await r.json();
    if(d.daily){ WX_API = d.daily; renderWxCard(); renderMain(); }
  }catch(e){ /* no weather available — card stays hidden */ }
}

function renderWxCard(){
  const el = document.getElementById('wx-card');
  if(!el || !SEL || !WX_API) return;
  const i = WX_API.time.indexOf(SEL);
  if(i === -1){ el.style.display='none'; return; }
  const [icon, label] = wmoLabel(WX_API.weathercode[i]);
  const hi  = Math.round(WX_API.temperature_2m_max[i]);
  const lo  = Math.round(WX_API.temperature_2m_min[i]);
  const rain = WX_API.precipitation_probability_max[i];
  const impact = wxImpactFromCode(WX_API.weathercode[i]);
  el.style.display = 'flex';
  el.innerHTML = `
    <div style="font-size:2rem;flex-shrink:0">${icon}</div>
    <div style="flex:1">
      <div style="font-size:.95rem;font-weight:500;color:var(--text)">${label} &nbsp;·&nbsp; ${hi}°/${lo}°C</div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:2px">💧 ${rain}% rain &nbsp;·&nbsp; London SE10</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-size:.8rem;font-weight:600;color:${impact>0?'var(--green)':impact<-10?'var(--red)':impact<0?'var(--amber)':'var(--muted)'}">
        ${impact>0?'▲ +'+impact+' pts':impact<0?'▼ '+impact+' pts':'→ Neutral'}
      </div>
      <div style="font-size:.68rem;color:var(--muted);margin-top:1px">footfall impact</div>
    </div>`;
}

function gd(k,d){try{return JSON.parse(localStorage.getItem('dial-'+k))||d;}catch(e){return d;}}
function sd(k,v){localStorage.setItem('dial-'+k,JSON.stringify(v));}
function getCustom(){return gd('custom',[]);}
function saveCustom(a){sd('custom',a);}
function getRev(){return gd('revenue',[]);}
function saveRev(a){sd('revenue',a);}

// ================================================================
// HELPERS
// ================================================================
function fmt(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function fgbp(n){return n?'£'+Number(n).toLocaleString('en-GB',{minimumFractionDigits:0}):'—';}
const DY=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DYF=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MOF=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WKDAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function bc(b){if(b>=85)return'var(--red)';if(b>=75)return'#f07832';if(b>=60)return'var(--amber)';return'var(--green)';}
function bl(b){if(b>=85)return'Manic';if(b>=75)return'Very Busy';if(b>=60)return'Busy';return'Moderate';}
function tg(level){return{low:'tag-g',moderate:'tag-b',high:'tag-a','very high':'tag-r'}[level]||'tag-a';}
function pillClass(type){return{pl:'pl',boxing:'boxing',ucl:'sport',wc:'sport',other:'sport'}[type]||'sport';}
function bannerClass(type){return{pl:'pl-banner',boxing:'boxing-banner',ucl:'football',wc:'football',other:'football'}[type]||'football';}
function badgeClass(type){return{pl:'pl',boxing:'boxing',ucl:'football',wc:'football',other:'football'}[type]||'football';}
function sportIcon(type){return{pl:'⚽',boxing:'🥊',ucl:'🏆',wc:'🌍',other:'🏅'}[type]||'🏅';}

function getWeek(){
  const now=new Date(),base=new Date(now);
  base.setDate(now.getDate()-((now.getDay()+6)%7)+WO*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(base);d.setDate(base.getDate()+i);return fmt(d);});
}
function showsOn(ds){return SHOWS.filter(e=>e.date===ds);}
function indigoOn(ds){return INDIGO.filter(e=>e.date===ds);}
function sportsOn(ds){return SPORTS.filter(e=>e.date===ds);}
function customOn(ds){return getCustom().filter(e=>e.date===ds);}
function dayBusy(ds){
  const m=SHOWS.find(e=>e.date===ds),sp=SPORTS.filter(e=>e.date===ds);
  let b=m?m.busy:sp.reduce((a,s)=>Math.max(a,s.solo||0),0);
  if(m)sp.forEach(s=>b=Math.min(100,b+(s.boost||0)));
  return b;
}

  const conditions = ['☀️ Clear / Sunny','🌤️ Partly Cloudy','☁️ Overcast','🌧️ Rain','⛈️ Heavy Rain / Storm','❄️ Cold & Dry','🌫️ Foggy','🌬️ Windy'];
  const condOpts = conditions.map(w=>`<option value="${w}" ${dayR&&dayR.weather===w?'selected':''}>${w}</option>`).join('');

  c.innerHTML=`
<div class="section">
  <h2>Log Revenue — ${DYF[d.getDay()]} ${d.getDate()} ${MOF[d.getMonth()]}</h2>
  <div class="fgrid2">
    <div class="fg"><label class="fl">Total Revenue (£)</label><input id="rv2-total" type="number" step="0.01" placeholder="0.00" value="${dayR?dayR.total:''}"></div>
    <div class="fg"><label class="fl">Food Revenue (£)</label><input id="rv2-food" type="number" step="0.01" placeholder="0.00" value="${dayR?dayR.food:''}"></div>
    <div class="fg"><label class="fl">Drinks Revenue (£)</label><input id="rv2-drinks" type="number" step="0.01" placeholder="0.00" value="${dayR?dayR.drinks:''}"></div>
    <div class="fg"><label class="fl">Covers / Guests</label><input id="rv2-covers" type="number" placeholder="0" value="${dayR?dayR.covers:''}"></div>
  </div>
  <div class="fgrid2" style="margin-bottom:9px">
    <div class="fg"><label class="fl">Weather / Conditions</label><select id="rv2-weather"><option value="">— Select —</option>${condOpts}</select></div>
    <div class="fg"><label class="fl">Weather Impact (1–10)</label><input id="rv2-weather-score" type="number" min="1" max="10" placeholder="e.g. 4 = rain hurt trade" value="${dayR&&dayR.weatherScore?dayR.weatherScore:''}"></div>
  </div>
  <div class="fg" style="margin-bottom:9px"><label class="fl">Notes</label><textarea id="rv2-notes" rows="2" placeholder="Night summary — what happened, what worked, any issues...">${dayR?dayR.notes:''}</textarea></div>
  <div class="factions"><button class="btn-p" onclick="saveRevInline()">Save</button><span class="saved" id="rv2-saved">✓ Saved</span></div>
</div>`;

  // Weather impact score legend
  c.innerHTML += `<div style="font-size:.72rem;color:var(--muted);padding:0 2px 12px;line-height:1.6">
    <strong style="color:var(--text)">Weather impact guide:</strong>
    1–3 = Badly hurt trade (heavy rain, storm) · 4–5 = Some impact (drizzle, cold) · 6–7 = Neutral · 8–10 = Helped trade (warm, sunny evening)
  </div>`;

  // History
  const hist=[...allR].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,40);
  if(hist.length){
    const rows=hist.map(r=>{
      const rd=new Date(r.date+'T12:00:00');
      const rs=SHOWS.find(s=>s.date===r.date);
      const rsp=SPORTS.find(s=>s.date===r.date);
      const fp=r.total>0?Math.round(r.food/r.total*100):0;
      const dp=r.total>0?Math.round(r.drinks/r.total*100):0;
      const weatherBadge = r.weather ? `<span style="font-size:.7rem;color:var(--muted)">${r.weather}${r.weatherScore?' · Impact: '+r.weatherScore+'/10':''}</span>` : '';
      return`<div class="rh-row" style="flex-wrap:wrap;gap:4px">
        <span class="rh-date">${DY[rd.getDay()]} ${rd.getDate()} ${MO[rd.getMonth()]}</span>
        <span class="rh-ev">${rs?rs.name:rsp?rsp.name:'—'}</span>
        <div style="text-align:right;flex:1">
          <div class="rh-total">${fgbp(r.total)}</div>
          <div class="rh-break">🍽 ${fgbp(r.food)} (${fp}%) · 🍺 ${fgbp(r.drinks)} (${dp}%)</div>
          ${weatherBadge}
        </div>
      </div>`;
    }).join('');
    c.innerHTML+=`<div class="section"><h2>Revenue History (last ${hist.length} nights)</h2><div>${rows}</div></div>`;
  }
  M.appendChild(c);
}

function jumpTo(ds){
  SEL=ds;
  const t=new Date(ds+'T12:00:00'),now=new Date();
  const tM=new Date(now);tM.setDate(now.getDate()-((now.getDay()+6)%7));
  const dM=new Date(t);dM.setDate(t.getDate()-((t.getDay()+6)%7));
  WO=Math.round((dM-tM)/(7*24*60*60*1000));
  renderSidebar();renderMain();
}
function changeWeek(dir){WO=WO+dir;SEL=getWeek()[0];renderSidebar();renderMain();}

// ================================================================
// CLOCK + MIDNIGHT AUTO-REFRESH
// ================================================================
// Polling approach — checks every second if the date has changed.
// Works even if the tab was left open across midnight reliably.
let _lastDay = fmt(new Date());
setInterval(()=>{
  const now = new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  // Countdown to midnight
  const tmrw=new Date(now);tmrw.setDate(now.getDate()+1);tmrw.setHours(0,0,5,0);
  const msLeft=tmrw-now;
  const h=Math.floor(msLeft/3600000),m=Math.floor((msLeft%3600000)/60000);
  const lbl=document.getElementById('refresh-label');
  if(lbl) lbl.textContent=`Refreshes in ${h}h ${m}m`;
  // Auto-refresh if day has changed (polling = works even if tab stayed open past midnight)
  const today=fmt(now);
  if(today!==_lastDay){
    _lastDay=today;
    const dot=document.getElementById('refresh-dot');
    if(dot){dot.style.background='var(--accent)';setTimeout(()=>dot.style.background='var(--green)',2000);}
    WO=0;SEL=today;renderSidebar();renderMain();
  }
},1000);

// ================================================================

// ── LIVE SPORTS FETCH — direct from football-data.org ──────────
// Calls the API directly from the browser (no server needed)
// FOOTBALL_API_KEY is embedded here since it's a free public API
// (rate limit: 10 req/min — we only make ~4 calls total)
let LIVE_DATA_LOADED = false;
const FBALL_KEY = '9cbf020d09e94c91a8c94a0f44d55f9a';

const UK_TEAMS = new Set([
  'Arsenal FC','Chelsea FC','Liverpool FC','Manchester City FC',
  'Manchester United FC','Tottenham Hotspur FC','Newcastle United FC',
  'Aston Villa FC','West Ham United FC',
  'Arsenal','Chelsea','Liverpool','Manchester City',
  'Manchester United','Tottenham','Newcastle','Aston Villa','West Ham',
  'England','Scotland','Wales',
]);

function isBST(ds){
  const d=new Date(ds),y=d.getFullYear();
  const lsm=new Date(y,2,31-(new Date(y,2,31).getDay()));
  const lso=new Date(y,9,31-(new Date(y,9,31).getDay()));
  return d>=lsm&&d<lso;
}
function utcToUK(s){
  const d=new Date(s),off=isBST(s)?1:0;
  d.setHours(d.getHours()+off);
  return d.toISOString().slice(0,16);
}
const _DY=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const _MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function niceKO(dateStr,timeStr,broadcaster){
  const d=new Date(dateStr+'T12:00:00');
  return `${_DY[d.getDay()]} ${d.getDate()} ${_MO[d.getMonth()]} · ${timeStr} BST · ${broadcaster}`;
}

async function fetchLiveData(){
  const dot=document.getElementById('refresh-dot');
  const lbl=document.getElementById('refresh-label');
  if(lbl) lbl.textContent='Fetching live sports...';

  const today=fmt(new Date());
  const end=fmt(new Date(Date.now()+60*24*60*60*1000));
  const comps=[
    {code:'PL', icon:'⚽',type:'pl', broadcaster:'Sky Sports'},
    {code:'CL', icon:'🏆',type:'ucl',broadcaster:'TNT Sports'},
    {code:'EL', icon:'🟠',type:'el', broadcaster:'TNT Sports'},
    {code:'WC', icon:'🌍',type:'wc', broadcaster:'ITV/BBC'},
  ];

  let newSports=0;
  const existingSp=new Set(SPORTS.map(s=>s.date+'|'+s.name.toLowerCase().trim()));

  for(const comp of comps){
    try{
      const url=`https://api.football-data.org/v4/competitions/${comp.code}/matches?dateFrom=${today}&dateTo=${end}&status=SCHEDULED,TIMED`;
      const r=await fetch(url,{'headers':{'X-Auth-Token':FBALL_KEY}});
      if(!r.ok) continue;
      const data=await r.json();
      for(const m of data.matches||[]){
        const uk=utcToUK(m.utcDate);
        const dateStr=uk.slice(0,10);
        const timeStr=uk.slice(11,16);
        const hour=parseInt(timeStr);
        if(hour<17&&hour>2) continue;
        const home=m.homeTeam?.name||'TBC';
        const away=m.awayTeam?.name||'TBC';
        const name=`${comp.icon} ${home} vs ${away}`;
        const key=dateStr+'|'+name.toLowerCase().trim();
        if(existingSp.has(key)) continue;
        existingSp.add(key);
        newSports++;
        const hasUK=UK_TEAMS.has(home)||UK_TEAMS.has(away);
        const hasEng=home.includes('England')||away.includes('England');
        const isFinal=(m.stage||'').toUpperCase().includes('FINAL');
        let boost=4,solo=22,impact='LOW',ic='moderate';
        if(hasEng){boost=18;solo=62;impact='MODERATE-HIGH';ic='high';}
        else if(hasUK&&comp.code==='PL'){boost=8;solo=40;impact='MODERATE';ic='moderate';}
        else if(hasUK||isFinal){boost=10;solo=44;impact='MODERATE';ic='moderate';}
        SPORTS.push({type:comp.type,date:dateStr,name,ko:niceKO(dateStr,timeStr,comp.broadcaster),boost,solo,impact,impact_class:ic});
      }
      await new Promise(r=>setTimeout(r,400));
    }catch(e){console.log(comp.code,'error:',e.message);}
  }

  LIVE_DATA_LOADED=true;
  if(dot) dot.style.background='var(--green)';
  if(lbl){
    const time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    lbl.textContent=`Live sports · ${time}${newSports>0?' · +'+newSports+' fixtures':''}`;
  }
  renderSidebar();
  renderMain();
}

(function(){
  const todayStr=fmt(new Date());
  const all=[...SHOWS,...SPORTS].sort((a,b)=>a.date.localeCompare(b.date));
  const next=all.find(e=>e.date>=todayStr);
  if(next){
    const d=new Date(next.date+'T12:00:00'),now=new Date();
    const tM=new Date(now);tM.setDate(now.getDate()-((now.getDay()+6)%7));
    const dM=new Date(d);dM.setDate(d.getDate()-((d.getDay()+6)%7));
    WO=Math.round((dM-tM)/(7*24*60*60*1000));SEL=next.date;
  }else SEL=todayStr;
  renderSidebar();renderMain();
  fetchLiveWeather();
  fetchLiveData(); // fetch fresh O2 + sports data
})();
